<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Training Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gray: { 850: '#1f2937', 900: '#111827', 950: '#030712' },
                        neon: { DEFAULT: '#3b82f6', hover: '#60a5fa' }, // Blue accent
                        power: { DEFAULT: '#fbbf24' } // Yellow for power
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #030712; color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }

        .superset-bracket { position: relative; }
        .superset-bracket::before {
            content: ''; position: absolute; left: -12px; top: 20px; bottom: 20px;
            width: 4px; background-color: #374151; border-radius: 4px;
        }
        
        .check-wrap { position: relative; width: 28px; height: 28px; }
        .custom-checkbox {
            appearance: none; width: 100%; height: 100%;
            background: #1f2937; border: 2px solid #4b5563;
            border-radius: 8px; cursor: pointer; transition: all 0.2s;
        }
        .custom-checkbox:checked { background: #10b981; border-color: #10b981; }
        .custom-checkbox:checked::after {
            content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            position: absolute; color: white; font-size: 14px;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .exercise-card { transition: all 0.2s ease; }
        .exercise-card.completed { opacity: 0.5; }
        .exercise-card.completed .ex-name { text-decoration: line-through; color: #9ca3af; }

        .track-input {
            background: #374151; border: 1px solid #4b5563; color: white;
            border-radius: 6px; padding: 4px 8px; width: 70px; text-align: center;
            font-size: 0.85rem; outline: none; transition: border-color 0.2s;
        }
        .track-input:focus { border-color: #3b82f6; }
        .quality-select { width: 116px; text-align: left; }
        .rule-input { width: 92px; }
        .planned-target {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.25);
            color: #bfdbfe;
            border-radius: 8px;
        }
        .planner-metrics {
            background: rgba(251, 191, 36, 0.08);
            border: 1px solid rgba(251, 191, 36, 0.22);
            color: #fde68a;
            border-radius: 8px;
        }
        .next-action {
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: #d1fae5;
            border-radius: 8px;
            line-height: 1.35;
        }
        .next-action[data-tone="warn"] {
            background: rgba(251, 191, 36, 0.09);
            border-color: rgba(251, 191, 36, 0.28);
            color: #fde68a;
        }
        .next-action[data-tone="danger"] {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.32);
            color: #fecaca;
        }
        .next-action[data-tone="idle"] {
            background: rgba(55, 65, 81, 0.6);
            border-color: #4b5563;
            color: #d1d5db;
        }
        
        .tab-btn { transition: all 0.3s; }
        .tab-btn.active { color: white; border-bottom: 2px solid #3b82f6; }
    </style>
</head>
<body class="antialiased pb-20">

<div class="max-w-md mx-auto min-h-screen bg-gray-900 relative shadow-2xl">

    const skillDrills = {
        handstand: [
            'Wrist prep + wall plank 5x20s',
            'Chest-to-wall handstand 5x20-30s + toe pulls',
            'Wall HSPU eccentric 4x2-4 + freestanding kick-up practice',
            'Deficit/wall HSPU or freestanding HSPU quality sets'
        ],
        pullSkill: [

            'Strict singles + band pull-ups 3-4x6-8',

        ],

            'Full dip + straight-bar support',
            'Ring support + ring push-up / weighted ring path'
        ],
        pistol: [
            'Deep squat mobility + box pistol high',
            'Box pistol + assisted pistol',
            'Counterweight pistol + lower box',
            'Full pistol + paused/deficit/weighted path'
        ],
        frontLever: [
            'Active hang + scapular depression',
            'Tuck front lever hold + tuck row',
            'Advanced tuck hold + tuck lever row',
            'One-leg/straddle lever + controlled lever rows'
        ],
        lSit: [
            'Tuck sit with foot taps',
            'Tuck L-sit holds',
            'One-leg L-sit + compression lifts',
            'Full L-sit + V-sit compression path'
        ]
    };

    const STORAGE_KEY_LOGS = 'hybrid_plan_logs_v2';
    const STORAGE_KEY_DATE = 'hybrid_plan_date_v2';
    const STORAGE_KEY_DONE = 'hybrid_plan_done_v2';
    const STORAGE_KEY_TARGETS = 'hybrid_plan_targets_v1';
    const STORAGE_KEY_RULES = 'hybrid_plan_rules_v1';
    const STORAGE_KEY_EXERCISE_INPUTS = 'hybrid_plan_exercise_inputs_v1';

    let userLogs = {};
    let doneToday = {};
    let planTargets = {};
    let progressionRules = {};
    let exerciseInputs = {};

    function safeGet(key) {
        try {
            const val = localStorage.getItem(key);
            return val ? JSON.parse(val) : null;
        } catch(e) { return null; }
    }

    function safeSet(key, val) {
        try { localStorage.setItem(key, JSON.stringify(val)); } 
        catch(e) {} // Fail silently if storage is blocked
    }
    
    function safeGetDate() {
        try { return localStorage.getItem(STORAGE_KEY_DATE); } 
        catch(e) { return null; }
    }
    function safeSetDate(val) {
        try { localStorage.setItem(STORAGE_KEY_DATE, val); } 
        catch(e) {}
    }

    function getDefaultRules() {
        return {
            bodyweightKg: 75,
            planWeeks: 24,
            startDate: '2026-06-01',
            repStep: 1,
            holdStep: 5,
            upperIncrementKg: 2.5,
            lowerIncrementKg: 5,
            accessoryIncrementKg: 2.5,
            skillWeeksPerLevel: 4,
            deloadEveryWeeks: 4,
            deloadLoadFactor: 0.9,
            deloadSetFactor: 0.6,
            strengthWeeklyPct: 0.025,
            hypertrophyWeeklyPct: 0.015,
            isolationWeeklyPct: 0.01,
            powerWeeklyPct: 0.005,
            benchAnchor1RM: 100,
            squatAnchor1RM: 140,
            deadliftAnchor1RM: 180,
            overheadPressAnchor1RM: 70,
            pullupAdded1RM: 25,
            rowAnchor1RM: 100,
            defaultRir: 2,
            selectedWeek: 1,
            handstandLevel: 1,
            pullSkillLevel: 1,
            ringDipLevel: 1,
            pistolLevel: 1,
            frontLeverLevel: 0,
            lSitLevel: 1
        };
    }

    function loadRules() {
        return { ...getDefaultRules(), ...(safeGet(STORAGE_KEY_RULES) || {}) };
    }

    function saveRules() {
        safeSet(STORAGE_KEY_RULES, progressionRules);
    }

    function prepareNewDayState(lastDate, todayStr, logs, done) {
        if (lastDate !== todayStr) return { logs: {}, done: {}, changed: true };
        return { logs: logs || {}, done: done || {}, changed: false };
    }

    function checkDailyReset() {
        const todayStr = new Date().toDateString();
        const lastDate = safeGetDate();
        const savedLogs = safeGet(STORAGE_KEY_LOGS) || {};
        const savedDone = safeGet(STORAGE_KEY_DONE) || {};
        const state = prepareNewDayState(lastDate, todayStr, savedLogs, savedDone);

        userLogs = state.logs;
        doneToday = state.done;
        planTargets = safeGet(STORAGE_KEY_TARGETS) || {};
        progressionRules = loadRules();
        exerciseInputs = safeGet(STORAGE_KEY_EXERCISE_INPUTS) || {};

        if (state.changed) {
            safeSet(STORAGE_KEY_LOGS, userLogs);
            safeSet(STORAGE_KEY_DONE, doneToday);
            safeSetDate(todayStr);
        }
    }

    function saveData() {
        safeSet(STORAGE_KEY_LOGS, userLogs);
        safeSet(STORAGE_KEY_DONE, doneToday);
        safeSet(STORAGE_KEY_TARGETS, planTargets);
        safeSet(STORAGE_KEY_EXERCISE_INPUTS, exerciseInputs);
    }

    function parsePerformanceValues(raw) {
        return String(raw || '').match(/\d+(?:\.\d+)?/g)?.map(Number) || [];
    }

    function findExerciseById(id) {
        for (const day of Object.values(planData)) {
            const exercise = day.exercises.find((ex) => ex.id === id);
            if (exercise) return exercise;
        }
        return null;
    }

    function getTopTarget(ex) {
        const ranges = [...ex.sets.matchAll(/(\d+)\s*[–-]\s*(\d+)/g)].map((match) => Number(match[2]));
        if (ranges.length) return Math.max(...ranges);
        const single = ex.sets.match(/×\s*(\d+)/);
        return single ? Number(single[1]) : null;
    }

    function getBottomTarget(ex) {
        const ranges = [...ex.sets.matchAll(/(\d+)\s*[â€“-]\s*(\d+)/g)].map((match) => Number(match[1]));
        if (ranges.length) return Math.min(...ranges);
        const single = ex.sets.match(/أ—\s*(\d+)/);
        return single ? Number(single[1]) : null;
    }

    function getSetCount(ex) {
        const nums = parsePerformanceValues(ex.sets);
        if (nums.length) return nums[0];
        const match = ex.sets.match(/(\d+)\s*(?:[â€“-]\s*\d+)?\s*(?:أ—|×|x)/i);
        return match ? Number(match[1]) : 1;
    }

    function getRepBounds(ex) {
        const nums = parsePerformanceValues(ex.sets);
        const setCount = nums[0] || getSetCount(ex);
        const hasSetRange = nums.length >= 4 && nums[1] > nums[0] && nums[1] <= nums[0] + 3;
        const bottom = hasSetRange ? nums[2] : (nums[1] || getBottomTarget(ex));
        const topPool = hasSetRange ? nums.slice(3) : nums.slice(2);
        const top = topPool.length ? Math.max(...topPool) : getTopTarget(ex);
        return {
            setCount,
            minTotal: bottom ? setCount * bottom : null,
            maxTotal: top ? setCount * top : null,
            top
        };
    }

    function didHitTop(ex, log = {}) {
        const values = parsePerformanceValues(log.reps);
        const bounds = getRepBounds(ex);
        if (!bounds.top || !values.length) return false;
        if (values.length > 1) return values.every((value) => value >= bounds.top);
        if (values.length >= bounds.setCount) return values.every((value) => value >= bounds.top);
        return Boolean(bounds.maxTotal && values[0] >= bounds.maxTotal);
    }

    function getExerciseCategory(ex) {
        const label = `${ex.name} ${ex.rule}`.toLowerCase();
        if (ex.order === 'P') return 'power';
        if (/leg|squat|rdl|split|calf|hip thrust|ham curl|pistol/i.test(label)) return 'lower';
        if (/curl|raise|pushdown|face pull|rear delt|hollow|dead bug|pallof/i.test(label)) return 'accessory';
        return 'upper';
    }

    function getProgressionTarget(ex) {
        const rule = ex.rule.toLowerCase();
        if (rule.includes('less band')) return 'reduce band 1 step or pull higher';
        if (rule.includes('less assist')) return 'reduce assistance 1 step';
        const match = ex.rule.match(/top\s*→\s*(.+)$/i);
        return match ? match[1].trim() : 'add weight';
    }

    function getProgressionIncrement(ex, rules = progressionRules) {
        const activeRules = { ...getDefaultRules(), ...(rules || {}) };
        const category = getExerciseCategory(ex);
        const match = ex.rule.match(/\+(\d+(?:\.\d+)?)/);
        if (match && !Number.isNaN(Number(match[1]))) {
            const explicit = Number(match[1]);
            if (category === 'lower') return activeRules.lowerIncrementKg;
            if (category === 'accessory') return activeRules.accessoryIncrementKg;
            if (/1â€“2|1-2/.test(ex.rule)) return activeRules.accessoryIncrementKg;
            if (/2â€“2\.5|2-2\.5/.test(ex.rule)) return activeRules.upperIncrementKg;
            return explicit;
        }

        if (category === 'lower') return activeRules.lowerIncrementKg;
        if (category === 'accessory') return activeRules.accessoryIncrementKg;
        if (category === 'power') return 0;
        return activeRules.upperIncrementKg;
    }

    function formatNumber(value) {
        return Number.isInteger(value) ? String(value) : String(Number(value.toFixed(2)));
    }

    function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
    }

    function roundToIncrement(value, increment) {
        const step = Number(increment) || 1;
        return Math.round(value / step) * step;
    }

    function getWeekPhase(week) {
        const w = Number(week) || 1;
        if (w <= 4) return 'Foundation';
        if (w <= 8) return 'Strength-skill bridge';
        if (w <= 12) return 'Specificity';
        return 'Specialization';
    }

    function isDeloadWeek(week, rules = progressionRules) {
        const every = Number(rules?.deloadEveryWeeks) || getDefaultRules().deloadEveryWeeks;
        return every > 0 && Number(week) % every === 0;
    }

    function getCurrentWeek(rules = progressionRules, today = new Date()) {
        const activeRules = { ...getDefaultRules(), ...(rules || {}) };
        const start = new Date(`${activeRules.startDate}T00:00:00`);
        if (Number.isNaN(start.getTime())) return Number(activeRules.selectedWeek) || 1;
        const diffMs = today.getTime() - start.getTime();
        const week = Math.floor(diffMs / (7 * 24 * 60 * 60 * 1000)) + 1;
        return clamp(week, 1, Number(activeRules.planWeeks) || 24);
    }

    function estimateOneRepMax(log = {}, rules = progressionRules) {
        const weight = parsePerformanceValues(log.currentLoad ?? log.weight)[0];
        const reps = parsePerformanceValues(log.currentReps ?? log.reps)[0];
        const rir = parsePerformanceValues(log.rir)[0] ?? Number(rules?.defaultRir ?? getDefaultRules().defaultRir);
        if (!weight || !reps) return null;
        return Number((weight * (1 + ((reps + rir) / 30))).toFixed(2));
    }

    function hasExerciseInput(input = {}) {
        return ['directE1RM', 'currentLoad', 'currentReps', 'rir', 'skillLevel'].some((key) => String(input[key] ?? '').trim() !== '');
    }

    function getPlannerInput(id) {
        const input = exerciseInputs[id] || {};
        return hasExerciseInput(input) ? input : getDisplayLog(id);
    }

    function getAnchor1RM(meta = {}, rules = progressionRules) {
        const activeRules = { ...getDefaultRules(), ...(rules || {}) };
        const anchors = {
            bench: Number(activeRules.benchAnchor1RM),
            squat: Number(activeRules.squatAnchor1RM),
            deadlift: Number(activeRules.deadliftAnchor1RM),
            ohp: Number(activeRules.overheadPressAnchor1RM),
            row: Number(activeRules.rowAnchor1RM),
            bodyweight: Number(activeRules.bodyweightKg),
            pullupTotal: Number(activeRules.bodyweightKg) + Number(activeRules.pullupAdded1RM)
        };
        return anchors[meta.basis] || 0;
    }

    function getWeeklyPctStep(meta = {}, rules = progressionRules) {
        const activeRules = { ...getDefaultRules(), ...(rules || {}) };
        const type = String(meta.type || '').toLowerCase();
        if (type.includes('power')) return Number(activeRules.powerWeeklyPct);
        if (type.includes('isolation')) return Number(activeRules.isolationWeeklyPct);
        if (type.includes('hypertrophy')) return Number(activeRules.hypertrophyWeeklyPct);
        if (type.includes('hold')) return 0;
        return Number(activeRules.strengthWeeklyPct);
    }

    function getEffectiveBuildWeeks(week, rules = progressionRules) {
        const every = Number(rules?.deloadEveryWeeks) || getDefaultRules().deloadEveryWeeks;
        const previousWeeks = Math.max(0, Number(week) - 1);
        return every > 0 ? previousWeeks - Math.floor(previousWeeks / every) : previousWeeks;
    }

    function getProjectedLoadPlan(ex, week = getCurrentWeek(), rules = progressionRules, log = {}) {
        const activeRules = { ...getDefaultRules(), ...(rules || {}) };
        const meta = exercisePlannerMeta[ex.id] || {};
        const deload = isDeloadWeek(week, activeRules);
        const setCount = getSetCount(ex);
        const adjustedSets = deload ? Math.max(1, Math.round(setCount * Number(activeRules.deloadSetFactor))) : setCount;

        if (meta.type === 'Skill') {
            return { type: 'Skill', phase: getWeekPhase(week), deload, sets: adjustedSets, load: '', percent: 0, e1rm: '', source: 'skill' };
        }

        const directE1RM = parsePerformanceValues(log.directE1RM)[0];
        const exerciseE1RM = directE1RM || estimateOneRepMax(log, activeRules);
        const anchor = exerciseE1RM || getAnchor1RM(meta, activeRules) * Number(meta.transfer || 0);
        const source = directE1RM ? 'direct e1RM' : (exerciseE1RM ? 'exercise e1RM' : `${meta.basis || 'anchor'} anchor`);
        const buildWeeks = getEffectiveBuildWeeks(week, activeRules);
        const rawPercent = Number(meta.startPct || 0) + buildWeeks * getWeeklyPctStep(meta, activeRules);
        const cappedPercent = Math.min(rawPercent, Number(meta.capPct || rawPercent));
        const effectivePercent = deload ? cappedPercent * Number(activeRules.deloadLoadFactor) : cappedPercent;
        let planned = anchor * effectivePercent;

        if (meta.basis === 'pullupTotal' && !exerciseE1RM) {
            planned = Math.max(0, planned - Number(activeRules.bodyweightKg));
        }

        const rounded = planned > 0 ? roundToIncrement(planned, meta.round || getProgressionIncrement(ex, activeRules) || 1) : 0;
        return {
            type: meta.type || getExerciseCategory(ex),
            phase: getWeekPhase(week),
            deload,
            sets: adjustedSets,
            percent: Number(effectivePercent.toFixed(2)),
            load: rounded ? formatNumber(rounded) : '',
            e1rm: exerciseE1RM ? formatNumber(exerciseE1RM) : '',
            source
        };
    }

    function getProjectedSkillPlan(skillKey, week = getCurrentWeek(), rules = progressionRules, input = {}) {
        const activeRules = { ...getDefaultRules(), ...(rules || {}) };
        const levelKeys = {
            handstand: 'handstandLevel',
            pullSkill: 'pullSkillLevel',
            ringDip: 'ringDipLevel',
            pistol: 'pistolLevel',
            frontLever: 'frontLeverLevel',
            lSit: 'lSitLevel'
        };
        const inputLevel = parsePerformanceValues(input.skillLevel)[0];
        const startLevel = Number(inputLevel ?? activeRules[levelKeys[skillKey]] ?? 0);
        const window = Number(activeRules.skillWeeksPerLevel) || 4;
        const level = clamp(startLevel + Math.floor((Number(week) - 1) / window), 0, 3);
        return {
            phase: getWeekPhase(week),
            level,
            drill: skillDrills[skillKey]?.[level] || 'Quality skill practice'
        };
    }

    function getBaselinePlanTarget(ex, week = getCurrentWeek(), rules = progressionRules, input = {}) {
        const meta = exercisePlannerMeta[ex.id] || {};
        if (meta.type === 'Skill') {
            const skillPlan = getProjectedSkillPlan(meta.skill, week, rules, input);
            return { skill: skillPlan.drill };
        }

        const projection = getProjectedLoadPlan(ex, week, rules, input);
        const bounds = getRepBounds(ex);
        const target = {};
        if (projection.load) target.weight = projection.load;
        if (bounds.minTotal) target.reps = String(bounds.minTotal);
        return target;
    }

    function getNextLoadTarget(ex, log = {}, rules = progressionRules) {
        const current = parsePerformanceValues(log.weight)[0];
        const increment = getProgressionIncrement(ex, rules);
        if (!current || !increment) return null;

        if (ex.rule.toLowerCase().includes('less assist')) {
            return `${formatNumber(Math.max(0, current - increment))}kg assistance`;
        }

        const suffix = ex.rule.includes('/hand') ? 'kg/hand' : 'kg';
        return `${formatNumber(current + increment)}${suffix}`;
    }

    function getNextRepTarget(log = {}, rules = progressionRules) {
        const total = parsePerformanceValues(log.reps).reduce((sum, value) => sum + value, 0);
        const step = Number(rules?.repStep) || getDefaultRules().repStep;
        return total ? `${formatNumber(total + step)} total clean reps` : null;
    }

    function getNextHoldTarget(log = {}, rules = progressionRules) {
        const total = parsePerformanceValues(log.reps).reduce((sum, value) => sum + value, 0);
        const step = Number(rules?.holdStep) || getDefaultRules().holdStep;
        return total ? `${formatNumber(total + step)}s total` : null;
    }

    function getNextPlanTarget(ex, log = {}, rules = progressionRules, currentTarget = {}) {
        const activeRules = { ...getDefaultRules(), ...(rules || {}) };
        const values = parsePerformanceValues(log.reps);
        const total = values.reduce((sum, value) => sum + value, 0);
        const weight = parsePerformanceValues(log.weight)[0];
        const result = {};

        if (log.quality === 'pain' || log.quality === 'speed-drop') return { ...currentTarget };
        if (!values.length && !log.quality) return { ...currentTarget };

        if (ex.order === 'P') {
            if (didHitTop(ex, log)) result.skill = getSkillProgressionTarget(ex);
            return { ...currentTarget, ...result };
        }

        if (didHitTop(ex, log)) {
            if (isHoldExercise(ex) || !weight) {
                result.skill = getSkillProgressionTarget(ex);
                return { ...currentTarget, ...result };
            }

            const increment = getProgressionIncrement(ex, activeRules);
            const nextWeight = ex.rule.toLowerCase().includes('less assist')
                ? Math.max(0, weight - increment)
                : weight + increment;
            result.weight = formatNumber(nextWeight);
            result.reps = String(getRepBounds(ex).minTotal || '');
            return result;
        }

        if (total) {
            const step = isHoldExercise(ex) ? activeRules.holdStep : activeRules.repStep;
            result.reps = formatNumber(total + step);
            if (weight) result.weight = formatNumber(weight);
            return result;
        }

        return { ...currentTarget };
    }

    function getSkillProgressionTarget(ex) {
        const targets = {
            'fri-p': 'reduce band 1 step or pull higher',
            'fri-1': 'wall handstand or a harder handstand line drill',
            'fri-2': 'chest-to-bar prep or a harder pull-up skill',
            'fri-3': 'straight-bar dip, transition drill, or muscle-up progression',
            'fri-4': 'one-leg L-sit or tuck front lever progression',
            'fri-5': 'lower box pistol or full pistol progression',
            'tue-4b': 'harder core variation'
        };
        return targets[ex.id] || 'the next harder skill level';
    }

    function isHoldExercise(ex) {
        return ex.sets.includes('s') || ex.rule.includes('+5s') || /handstand|l-sit|front lever/i.test(ex.name);
    }

    function getImmediateRuleAction(ex, log = {}) {
        const values = parsePerformanceValues(log.reps);
        const quality = log.quality || '';
        const hitTop = didHitTop(ex, log);
        const progression = getProgressionTarget(ex);
        const nextPlan = getNextPlanTarget(ex, log, progressionRules, planTargets[ex.id] || {});

        if (quality === 'pain') {
            return { tone: 'danger', message: 'Pain/ugly reps: stop or regress. Use same weight or -5% next time.' };
        }

        if (quality === 'speed-drop') {
            return { tone: 'warn', message: 'Speed dropped: stop the power work now. Keep it fast next time.' };
        }

        if (!values.length && !quality) {
            return { tone: 'idle', message: 'Log reps/sec and quality to apply the rule immediately.' };
        }

        if (ex.order === 'P') {
            if (hitTop && progression.includes('band')) {
                return { tone: 'success', message: `Top clean: ${getSkillProgressionTarget(ex)} next time.` };
            }
            if (quality === 'clean') {
                return { tone: 'success', message: 'Fast today: repeat until 2 fast weeks, then go harder/+small load.' };
            }
            return { tone: 'idle', message: 'Power first: keep every rep fast at 30-70% 1RM.' };
        }

        if (quality === 'not-top') {
            const nextTarget = isHoldExercise(ex) ? getNextHoldTarget(log) : getNextRepTarget(log);
            return {
                tone: 'warn',
                message: nextPlan.weight && nextPlan.reps
                    ? `Not top: next target ${nextPlan.weight}kg x ${nextPlan.reps} total clean reps.`
                    : (nextTarget
                        ? `Not top: next target ${nextTarget}.`
                        : (isHoldExercise(ex) ? 'Not at target: add +5s total next week.' : 'Not top: add +1 total clean rep next time.'))
            };
        }

        if (hitTop) {
            if (isHoldExercise(ex)) return { tone: 'success', message: `Target reached: advance to ${getSkillProgressionTarget(ex)}.` };
            if (nextPlan.weight && nextPlan.reps) return { tone: 'success', message: `Top clean: next target ${nextPlan.weight}kg x ${nextPlan.reps} total reps.` };
            return { tone: 'success', message: `Top clean: add ${progression} next time.` };
        }

        if (values.length) {
            const nextTarget = isHoldExercise(ex) ? getNextHoldTarget(log) : getNextRepTarget(log);
            return {
                tone: 'warn',
                message: nextPlan.weight && nextPlan.reps
                    ? `Not top: next target ${nextPlan.weight}kg x ${nextPlan.reps} total clean reps.`
                    : (nextTarget
                        ? `Not top: next target ${nextTarget}.`
                        : (isHoldExercise(ex) ? 'Not at target: add +5s total next week.' : 'Not top: add +1 total clean rep next time.'))
            };
        }

        return { tone: 'idle', message: 'Choose quality to apply the progression rule.' };
    }

    function getDisplayLog(id) {
        const saved = userLogs[id] || {};
        const target = planTargets[id] || {};
        return {
            weight: Object.prototype.hasOwnProperty.call(saved, 'weight') ? saved.weight : (target.weight || ''),
            reps: Object.prototype.hasOwnProperty.call(saved, 'reps') ? saved.reps : (target.reps || ''),
            rir: Object.prototype.hasOwnProperty.call(saved, 'rir') ? saved.rir : '',
            quality: saved.quality || '',
        };
    }

    function targetSummary(target = {}) {
        const parts = [];
        if (target.weight) parts.push(`${target.weight}kg`);
        if (target.reps) parts.push(`${target.reps}${String(target.reps).includes('s') ? '' : ' total reps'}`);
        if (target.skill) parts.push(target.skill);
        return parts.join(' x ');
    }

    function saveNextTarget(id) {
        const ex = findExerciseById(id);
        if (!ex) return;
        const target = getNextPlanTarget(ex, getDisplayLog(id), progressionRules, planTargets[id] || {});
        if (target && Object.keys(target).length) {
            planTargets[id] = target;
            saveData();
        }
    }

    function updateNextAction(id) {
        const ex = findExerciseById(id);
        const actionEl = document.querySelector(`[data-next-action="${id}"]`);
        if (!ex || !actionEl) return;
        const action = getImmediateRuleAction(ex, getDisplayLog(id));
        actionEl.textContent = action.message;
        actionEl.dataset.tone = action.tone;

        const plannedEl = document.querySelector(`[data-planned-target="${id}"]`);
        if (plannedEl) {
            const summary = targetSummary(planTargets[id]);
            plannedEl.textContent = summary ? `Next planned: ${summary}` : 'Next planned: log this set to build the target';
        }

        const metricsEl = document.querySelector(`[data-planner-metrics="${id}"]`);
        if (metricsEl) {
            const weekNumber = getCurrentWeek(progressionRules);
            const projected = getProjectedLoadPlan(ex, weekNumber, progressionRules, getPlannerInput(id));
            metricsEl.textContent = `Week ${weekNumber} • ${projected.phase}${projected.deload ? ' • Deload' : ' • Build'} • ${projected.type}${projected.percent ? ` • ${Math.round(projected.percent * 100)}% 1RM` : ''}${projected.load ? ` • planned ${projected.load}kg` : ''}${projected.e1rm ? ` • e1RM ${projected.e1rm}kg` : ''}`;
        }
    }

                                        </div>
                                    </div>
                                    <div class="mt-2 text-gray-300">
                                        ${projection.percent ? `${Math.round(projection.percent * 100)}% 1RM • ` : ''}${projection.source}${projection.e1rm ? ` • e1RM ${projection.e1rm}kg` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </section>

                <section class="bg-gray-850 p-5 rounded-xl border border-gray-800">
                    <h3 class="text-lg font-bold text-white mb-3"><i class="fa-solid fa-layer-group mr-2 text-neon"></i>Skill Progress</h3>
                    <div class="space-y-2">
                        ${skillRows.map(([key, label]) => {
                            const skillExercise = exercises.find((ex) => exercisePlannerMeta[ex.id]?.skill === key);
                            const plan = getProjectedSkillPlan(key, selectedWeek, rules, skillExercise ? getPlannerInput(skillExercise.id) : {});
                            return `
                                <div class="rounded-lg bg-gray-800 p-3 text-xs">
                                    <div class="flex items-center justify-between gap-3">
                                        <span class="font-bold text-gray-100">${label}</span>
                                        <span class="font-extrabold text-power">L${plan.level}</span>
                                    </div>
                                    <div class="mt-1 text-gray-300">${plan.drill}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </section>
            </div>
        `;
        document.getElementById('main-content').innerHTML = html;
    }

    function applyExerciseBaseline(id) {
        const ex = findExerciseById(id);
        if (!ex) return;
        const weekNumber = getCurrentWeek(progressionRules);
        const input = exerciseInputs[id] || {};
        const target = getBaselinePlanTarget(ex, weekNumber, progressionRules, input);
        if (target && Object.keys(target).length) planTargets[id] = target;
        delete userLogs[id];
        doneToday[id] = false;
        saveData();
    }

    function renderInputs() {
        const weekNumber = getCurrentWeek(progressionRules);
        const exercises = getAllExercisesWithDay().filter((ex) => ex.order !== 'W');
        const html = `
            <div class="space-y-4 pb-6">
                <section class="bg-gray-850 p-5 rounded-xl border border-gray-800">
                    <h2 class="text-xl font-bold text-white mb-1"><i class="fa-solid fa-table-list mr-2 text-neon"></i>Exercise Inputs</h2>
                    <p class="mb-4 text-xs text-gray-400">Edit a baseline row to recalculate that exercise from week ${weekNumber} and restart its target tracking.</p>
                    <div class="space-y-3">
                        ${exercises.map((ex) => {
                            const input = exerciseInputs[ex.id] || {};
                            const meta = exercisePlannerMeta[ex.id] || {};
                            const projection = getProjectedLoadPlan(ex, weekNumber, progressionRules, input);
                            const target = getBaselinePlanTarget(ex, weekNumber, progressionRules, input);
                            const isSkill = meta.type === 'Skill';
                            return `
                                <div class="rounded-lg bg-gray-800 p-3 text-xs">
                                    <div class="mb-2 flex items-start justify-between gap-3">
                                        <div>
                                            <div class="font-bold text-gray-100">${ex.dayTitle.replace(' â€” ', ' ')} • ${ex.order} ${ex.name}</div>
                                            <div class="text-gray-400">${projection.type} • ${projection.source}</div>
                                        </div>
                                        <div class="text-right font-extrabold text-power">${targetSummary(target) || projection.type}</div>
                                    </div>
                                    ${isSkill ? `
                                        <div class="flex flex-wrap justify-end gap-2">
                                            <input type="number" min="0" max="3" step="1" placeholder="Level" class="track-input planner-input" data-id="${ex.id}" data-field="skillLevel" value="${input.skillLevel || ''}">
                                        </div>
                                    ` : `
                                        <div class="flex flex-wrap justify-end gap-2">
                                            <input type="text" placeholder="load" class="track-input planner-input" data-id="${ex.id}" data-field="currentLoad" value="${input.currentLoad || ''}">
                                            <input type="text" placeholder="reps" class="track-input planner-input" data-id="${ex.id}" data-field="currentReps" value="${input.currentReps || ''}">
                                            <input type="text" placeholder="RIR" class="track-input planner-input" data-id="${ex.id}" data-field="rir" value="${input.rir || ''}">
                                            <input type="text" placeholder="e1RM" class="track-input planner-input" data-id="${ex.id}" data-field="directE1RM" value="${input.directE1RM || ''}">
                                        </div>
                                    `}
                                    <div class="mt-2 text-gray-300">
                                        ${projection.percent ? `${Math.round(projection.percent * 100)}% 1RM • ` : ''}${projection.load ? `planned ${projection.load}kg • ` : ''}${projection.e1rm ? `e1RM ${projection.e1rm}kg • ` : ''}${projection.phase}${projection.deload ? ' • deload' : ' • build'}
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </section>
            </div>
        `;
        document.getElementById('main-content').innerHTML = html;
    }

    function renderRules() {
        const rules = { ...getDefaultRules(), ...progressionRules };
        const groups = [
            {
                title: 'Global Inputs',
                rows: [
                    { key: 'bodyweightKg', label: 'Bodyweight', suffix: 'kg', step: '0.5' },
                    { key: 'planWeeks', label: 'Plan length', suffix: 'weeks', step: '1' },
                    { key: 'startDate', label: 'Start date', suffix: '', type: 'date' },
                    { key: 'selectedWeek', label: 'Week view', suffix: 'week', step: '1' },
                    { key: 'defaultRir', label: 'Default RIR', suffix: 'RIR', step: '1' }
                ]
            },
            {
                title: 'Progression Rules',
                rows: [
                    { key: 'repStep', label: 'Rep step', suffix: 'rep', step: '1' },
                    { key: 'holdStep', label: 'Hold step', suffix: 'sec', step: '1' },
                    { key: 'upperIncrementKg', label: 'Upper increment', suffix: 'kg', step: '0.5' },
                    { key: 'lowerIncrementKg', label: 'Lower increment', suffix: 'kg', step: '0.5' },
                    { key: 'accessoryIncrementKg', label: 'Accessory increment', suffix: 'kg', step: '0.5' },
                    { key: 'deloadEveryWeeks', label: 'Deload every', suffix: 'weeks', step: '1' },
                    { key: 'deloadLoadFactor', label: 'Deload load factor', suffix: 'x', step: '0.05' },
                    { key: 'deloadSetFactor', label: 'Deload set factor', suffix: 'x', step: '0.05' }
                ]
            },
            {
                title: 'Weekly % Steps',
                rows: [
                    { key: 'strengthWeeklyPct', label: 'Strength +%', suffix: '/week', step: '0.005' },
                    { key: 'hypertrophyWeeklyPct', label: 'Hypertrophy +%', suffix: '/week', step: '0.005' },
                    { key: 'isolationWeeklyPct', label: 'Isolation +%', suffix: '/week', step: '0.005' },
                    { key: 'powerWeeklyPct', label: 'Power +%', suffix: '/week', step: '0.005' }
                ]
            },
            {
                title: '1RM / e1RM Anchors',
                rows: [
                    { key: 'benchAnchor1RM', label: 'Bench press', suffix: 'kg', step: '0.5' },
                    { key: 'squatAnchor1RM', label: 'Squat / leg press', suffix: 'kg', step: '0.5' },
                    { key: 'deadliftAnchor1RM', label: 'Deadlift / trap bar', suffix: 'kg', step: '0.5' },
                    { key: 'overheadPressAnchor1RM', label: 'Overhead press', suffix: 'kg', step: '0.5' },
                    { key: 'pullupAdded1RM', label: 'Pull-up added 1RM', suffix: 'kg', step: '0.5' },
                    { key: 'rowAnchor1RM', label: 'Row', suffix: 'kg', step: '0.5' }
                ]
            },
            {
                title: 'Starting Skill Levels',
                rows: [
                    { key: 'skillWeeksPerLevel', label: 'Level window', suffix: 'weeks', step: '1' },
                    { key: 'handstandLevel', label: 'Handstand / HSPU', suffix: 'L0-3', step: '1' },
                    { key: 'pullSkillLevel', label: 'Pull / muscle-up', suffix: 'L0-3', step: '1' },
                    { key: 'ringDipLevel', label: 'Ring / dip', suffix: 'L0-3', step: '1' },
                    { key: 'pistolLevel', label: 'Pistol', suffix: 'L0-3', step: '1' },
                    { key: 'frontLeverLevel', label: 'Front lever', suffix: 'L0-3', step: '1' },
                    { key: 'lSitLevel', label: 'L-sit', suffix: 'L0-3', step: '1' }
                ]
            }
        ];

        const html = `
            <div class="space-y-4 pb-6">
                <section class="bg-gray-850 p-5 rounded-xl border border-gray-800">
                    <h2 class="text-xl font-bold text-white mb-4"><i class="fa-solid fa-sliders mr-2 text-neon"></i>Rules</h2>
                    <div class="space-y-5">
                        ${groups.map((group) => `
                            <div>
                                <h3 class="mb-2 text-sm font-extrabold text-power">${group.title}</h3>
                                <div class="space-y-2">
                                    ${group.rows.map((row) => `
                                        <label class="flex items-center justify-between gap-3 rounded-lg bg-gray-800 px-3 py-3">
                                            <span class="text-sm font-semibold text-gray-200">${row.label}</span>
                                            <span class="flex items-center gap-2">
                                                <input type="${row.type || 'number'}" step="${row.step || '0.1'}" class="track-input rule-input" data-rule="${row.key}" value="${rules[row.key]}">
                                                <span class="w-12 text-xs text-gray-400">${row.suffix}</span>
                                            </span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>

                <section class="bg-gray-850 p-5 rounded-xl border border-gray-800">
                    <h3 class="text-lg font-bold text-power mb-3"><i class="fa-solid fa-table-cells mr-2"></i>Planner Model</h3>
                    <ul class="text-sm text-gray-300 space-y-2 list-disc pl-4">
                        <li>Top clean: add load, then restart at bottom total reps.</li>
                        <li>Not top: keep load and add the rep step to total clean reps.</li>
                        <li>Holds: keep level and add the hold step until the target is clean.</li>
                        <li>Pain, ugly reps, or speed drop: keep the current plan target.</li>
                        <li>e1RM guide: load x (1 + (reps + RIR) / 30).</li>
                    </ul>
                </section>
            </div>
        `;
        document.getElementById('main-content').innerHTML = html;
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active', 'text-white', 'border-b-2', 'border-neon');
            if (btn.dataset.tab === tabId) {
                btn.classList.add('active', 'text-white', 'border-b-2', 'border-neon');
            }
        });

        if (tabId === 'info') renderInfo();
        else if (tabId === 'inputs') renderInputs();
        else if (tabId === 'week') renderWeekView();
        else if (tabId === 'rules') renderRules();
        else renderWorkout(tabId);
    }

    // Event Delegation for Checkboxes and Inputs (Safe for all environments)
    document.getElementById('main-content').addEventListener('change', (e) => {
        if (e.target.classList.contains('ex-checkbox')) {
            const id = e.target.dataset.id;
            const isChecked = e.target.checked;
            
            doneToday[id] = isChecked;
            saveData();
            
            const card = document.getElementById(`card-${id}`);
            if (isChecked) card.classList.add('completed');
            else card.classList.remove('completed');
        }
    });

    document.getElementById('main-content').addEventListener('input', (e) => {
        if (e.target.classList.contains('planner-input')) {
            const id = e.target.dataset.id;
            const field = e.target.dataset.field;
            if (!exerciseInputs[id]) exerciseInputs[id] = {};
            exerciseInputs[id][field] = e.target.value;
            if (field === 'skillLevel' && e.target.value !== '') {
                exerciseInputs[id][field] = String(clamp(Number(e.target.value), 0, 3));
            }
            applyExerciseBaseline(id);
        }
        if (e.target.classList.contains('weight-input')) {
            const id = e.target.dataset.id;
            if (!userLogs[id]) userLogs[id] = { weight: '', reps: '' };
            userLogs[id].weight = e.target.value;
            saveNextTarget(id);
            saveData();
            updateNextAction(id);
        }
        if (e.target.classList.contains('reps-input')) {
            const id = e.target.dataset.id;
            if (!userLogs[id]) userLogs[id] = { weight: '', reps: '' };
            userLogs[id].reps = e.target.value;
            saveNextTarget(id);
            saveData();
            updateNextAction(id);
        }
        if (e.target.classList.contains('rir-input')) {
            const id = e.target.dataset.id;
            if (!userLogs[id]) userLogs[id] = { weight: '', reps: '' };
            userLogs[id].rir = e.target.value;
            saveNextTarget(id);
            saveData();
            updateNextAction(id);
        }
    });

    document.getElementById('main-content').addEventListener('change', (e) => {
        if (e.target.classList.contains('quality-select')) {
            const id = e.target.dataset.id;
            if (!userLogs[id]) userLogs[id] = { weight: '', reps: '' };
            userLogs[id].quality = e.target.value;
            saveNextTarget(id);
            saveData();
            updateNextAction(id);
        }
        if (e.target.classList.contains('rule-input')) {
            const key = e.target.dataset.rule;
            if (key === 'startDate') {
                progressionRules[key] = e.target.value || getDefaultRules()[key];
            } else {
                let value = Number(e.target.value);
                if (/Level$/.test(key)) value = clamp(value, 0, 3);
                if (key === 'selectedWeek') value = clamp(value, 1, Number(progressionRules.planWeeks || getDefaultRules().planWeeks));
                progressionRules[key] = Number.isFinite(value) ? value : getDefaultRules()[key];
            }
            saveRules();
            saveData();
            renderRules();
        }
        if (e.target.classList.contains('planner-input')) {
            const id = e.target.dataset.id;
            const field = e.target.dataset.field;
            if (!exerciseInputs[id]) exerciseInputs[id] = {};
            exerciseInputs[id][field] = e.target.value;
            if (field === 'skillLevel' && e.target.value !== '') {
                exerciseInputs[id][field] = String(clamp(Number(e.target.value), 0, 3));
            }
            applyExerciseBaseline(id);
        }
        if (e.target.classList.contains('week-input')) {
            const maxWeek = Number(progressionRules.planWeeks || getDefaultRules().planWeeks);
            progressionRules.selectedWeek = clamp(Number(e.target.value) || 1, 1, maxWeek);
            saveRules();
            renderWeekView();
        }
    });

    document.getElementById('tabs-container').addEventListener('click', (e) => {
        const btn = e.target.closest('.tab-btn');
        if (btn) {
            switchTab(btn.dataset.tab);
        }
    });

    checkDailyReset();
    
    // Auto-select tab based on day
    const todayIndex = new Date().getDay(); 
    if (todayIndex === 2) switchTab('tue');
    else if (todayIndex === 4) switchTab('thu');
    else if (todayIndex === 5) switchTab('fri');
    else switchTab('tue'); // Fallback

</script>
</body>
</html>

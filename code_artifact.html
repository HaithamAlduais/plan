<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول المهام الذكي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #059669; /* أخضر مريح للعين */
            --primary-hover: #047857;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --active-bg: #ecfdf5;
            --active-border: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            overflow: hidden;
            padding: 24px;
            position: relative;
        }

        #loader {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header {
            text-align: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .location-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .date-display {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .day-display {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .time-display {
            font-size: 1.8rem;
            font-weight: bold;
            color: var(--text-main);
            margin-top: 5px;
            font-variant-numeric: tabular-nums;
        }

        .progress-container {
            background: var(--bg);
            border-radius: 10px;
            height: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: var(--success);
            width: 0%;
            transition: width 0.4s ease;
        }

        .todo-list {
            list-style: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 14px 10px;
            border: 1px solid var(--border);
            border-radius: 12px;
            margin-bottom: 8px;
            background: var(--card-bg);
            position: relative;
            overflow: hidden;
            transition: border-color 0.2s, background-color 0.2s;
        }

        /* تمييز المهمة الحالية */
        .todo-item.active-task {
            background-color: var(--active-bg);
            border-color: var(--active-border);
        }

        .todo-item.active-task::before {
            content: '';
            position: absolute;
            right: 0; top: 0; bottom: 0;
            width: 5px;
            background-color: var(--primary);
        }

        .time-block {
            min-width: 90px;
            text-align: center;
            padding-left: 10px;
            border-left: 1px dashed var(--border);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .time-start {
            font-size: 0.95rem;
            font-weight: bold;
        }

        .time-end {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .checkbox-container {
            padding: 0 12px;
        }

        .custom-checkbox {
            appearance: none;
            width: 24px;
            height: 24px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
        }

        .custom-checkbox:checked {
            background-color: var(--success);
            border-color: var(--success);
        }

        .custom-checkbox:checked::after {
            content: '✓';
            color: white;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
        }

        .task-details {
            flex-grow: 1;
            cursor: pointer;
        }

        .task-period {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: bold;
        }

        .task-name {
            font-size: 1.05rem;
            margin-top: 2px;
            line-height: 1.4;
        }

        .prayer-row {
            background-color: #f0fdfa; /* لون خفيف جداً لتمييز الصلوات */
            border-color: #ccfbf1;
        }

        .completed .task-name {
            text-decoration: line-through;
            color: var(--text-muted);
            opacity: 0.7;
        }

        .error-msg { display: none; color: #ef4444; margin-top: 10px; text-align: center; font-size: 0.9rem;}
        .retry-btn { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; margin-top: 5px;}
        .page-link {
            display: inline-flex;
            position: relative;
            z-index: 101;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            min-height: 42px;
            margin-bottom: 18px;
            border-radius: 10px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            text-decoration: none;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }
        .page-link:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="app-container">
    <a class="page-link" href="hybrid_training_tracker.html">
        <i class="fa-solid fa-dumbbell"></i>
        Hybrid Training Tracker
    </a>

    <div id="loader">
        <div class="spinner"></div>
        <p>جاري ضبط الجدول بناءً على الأوقات الدقيقة...</p>
        <div id="errorBox" class="error-msg">
            <p id="errorText"></p>
            <button class="retry-btn" onclick="initApp()">إعادة المحاولة</button>
        </div>
    </div>

    <div class="header">
        <div class="location-info" id="locationDisplay">
            <i class="fa-solid fa-location-dot"></i> <span>جاري التحديد...</span>
        </div>
        <div class="date-display" id="dateDisplay">--</div>
        <div class="day-display" id="dayDisplay">--</div>
        <div class="time-display" id="clockDisplay">00:00:00</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>

    <ul class="todo-list" id="todoList"></ul>
</div>

<script>
    const daysArabic = ["الأحد", "الاثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
    let schedulePeriods = [];
    let savedTasks = {};
    let currentDayIndex = 0;
    let logicalDateStr = "";

    function updateClock() {
        document.getElementById('clockDisplay').innerText = new Date().toLocaleTimeString('ar-SA', { hour12: true });
        updateActiveTask();
    }
    setInterval(updateClock, 1000);

    function initApp() {
        document.getElementById('errorBox').style.display = 'none';
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => fetchDaysData(pos.coords.latitude, pos.coords.longitude),
                () => fetchDaysData(24.7136, 46.6753), // الرياض افتراضي
                { timeout: 10000 }
            );
        } else {
            fetchDaysData(24.7136, 46.6753);
        }
    }

    // جلب بيانات 4 أيام لضمان تغطية الساعات بعد منتصف الليل
    async function fetchDaysData(lat, lon) {
        try {
            const apiCalls = [-2, -1, 0, 1].map(offset => {
                const d = new Date();
                d.setDate(d.getDate() + offset);
                const dateStr = `${d.getDate()}-${d.getMonth() + 1}-${d.getFullYear()}`;
                return fetch(`https://api.aladhan.com/v1/timings/${dateStr}?latitude=${lat}&longitude=${lon}&method=4`);
            });

            const responses = await Promise.all(apiCalls);
            const dataArr = await Promise.all(responses.map(res => res.json()));
            
            document.getElementById('locationDisplay').innerHTML = `<i class="fa-solid fa-location-dot"></i> <span>تم ضبط الأوقات بناءً على موقعك</span>`;
            buildLogicalSchedule(dataArr);
        } catch (error) {
            document.getElementById('errorText').innerText = "حدث خطأ في الاتصال بالخادم. يرجى التأكد من الإنترنت.";
            document.getElementById('errorBox').style.display = 'block';
        }
    }

    function timeToDateObj(timeStr, baseDateObj) {
        const [h, m] = timeStr.split(':');
        const d = new Date(baseDateObj);
        d.setHours(parseInt(h), parseInt(m), 0, 0);
        return d;
    }

    function buildLogicalSchedule(dataArr) {
        const now = new Date();
        
        // الأيام الأربعة التي جلبناها (قبل أمس، أمس، اليوم، غداً)
        const dates = [-2, -1, 0, 1].map(offset => {
            const d = new Date(); d.setDate(d.getDate() + offset); return d;
        });

        // لحساب متى يبدأ القيام اليوم
        const yesterdayMaghrib = timeToDateObj(dataArr[1].data.timings.Maghrib, dates[1]);
        const todayFajr = timeToDateObj(dataArr[2].data.timings.Fajr, dates[2]);
        const nightDurationToday = todayFajr.getTime() - yesterdayMaghrib.getTime();
        const qiyamStartToday = new Date(todayFajr.getTime() - (nightDurationToday / 3));

        // -- تحديد اليوم المنطقي --
        // إذا كنا بعد منتصف الليل وقبل أذان القيام، فأنت فعلياً تعيش في "نهاية اليوم السابق"
        let baseIndex = 2; // الافتراضي هو اليوم الحالي
        if (now.getTime() < qiyamStartToday.getTime()) {
            baseIndex = 1; // التعامل معه على أنه أمس
        }

        const prevDate = dates[baseIndex - 1];
        const currDate = dates[baseIndex];
        const nextDate = dates[baseIndex + 1];

        const tPrev = dataArr[baseIndex - 1].data.timings;
        const tCurr = dataArr[baseIndex].data.timings;
        const tNext = dataArr[baseIndex + 1].data.timings;

        // -- استخراج الأوقات الدقيقة --
        const maghribPrev = timeToDateObj(tPrev.Maghrib, prevDate);
        const fajrCurr = timeToDateObj(tCurr.Fajr, currDate);
        const sunriseCurr = timeToDateObj(tCurr.Sunrise, currDate);
        const dhuhrCurr = timeToDateObj(tCurr.Dhuhr, currDate);
        const asrCurr = timeToDateObj(tCurr.Asr, currDate);
        const maghribCurr = timeToDateObj(tCurr.Maghrib, currDate);
        const ishaCurr = timeToDateObj(tCurr.Isha, currDate);
        const fajrNext = timeToDateObj(tNext.Fajr, nextDate);

        // حساب القيام الحالي (من مغرب السابق لفجر الحالي)
        const nightLen1 = fajrCurr.getTime() - maghribPrev.getTime();
        const qiyamStart = new Date(fajrCurr.getTime() - (nightLen1 / 3));
        const sudusStart = new Date(fajrCurr.getTime() - (nightLen1 / 6));

        // حساب القيام القادم (لتحديد نهاية مهمة "الليل")
        const nightLen2 = fajrNext.getTime() - maghribCurr.getTime();
        const nextQiyamStart = new Date(fajrNext.getTime() - (nightLen2 / 3));

        const addMins = (d, m) => new Date(d.getTime() + m * 60000);

        // تحديث الواجهة لتتوافق مع "اليوم المنطقي"
        currentDayIndex = currDate.getDay();
        logicalDateStr = currDate.toLocaleDateString('en-GB'); // كمفتاح للحفظ
        
        document.getElementById('dayDisplay').innerText = `يوم ${daysArabic[currentDayIndex]}`;
        // رسالة توضح أن اليوم مستمر حتى إذا تجاوزنا منتصف الليل
        const dateDisplayTxt = currDate.toLocaleDateString('ar-SA', { year: 'numeric', month: 'long', day: 'numeric' });
        document.getElementById('dateDisplay').innerText = dateDisplayTxt;

        // -- الجدول مرتب ترتيباً ثابتاً غير قابل للتغيير! --
        schedulePeriods = [
            { id: 'qiyam', time: 'صلاة القيام', type: 'prayer', start: qiyamStart, end: addMins(qiyamStart, 30), getTask: () => 'جزء قيام + دعاء + استخارة + توبة' },
            { id: 'sudus', time: 'القيام - السدس', type: 'normal', start: addMins(qiyamStart, 30), end: sudusStart, getTask: (d) => [5,6].includes(d) ? 'تطوير (بدون سحور)' : 'سحور واستغفار⁵ + تطوير' },
            { id: 'sleep1', time: 'السدس - الفجر', type: 'normal', start: sudusStart, end: fajrCurr, getTask: () => 'نوم' },
            { id: 'fajr', time: 'صلاة الفجر', type: 'prayer', start: fajrCurr, end: addMins(fajrCurr, 30), getTask: () => 'ترديد + حزب + أذكار³' },
            { id: 'morning', time: 'الفجر - الشروق', type: 'normal', start: addMins(fajrCurr, 30), end: sunriseCurr, getTask: (d) => [0,2,4].includes(d) ? 'تمرين³' : ([1,3].includes(d) ? 'إنجليزي²' : 'فطور²') },
            { id: 'work_sleep', time: 'الشروق - الظهر', type: 'normal', start: sunriseCurr, end: dhuhrCurr, getTask: (d) => [5,6].includes(d) ? 'نوم²' : 'عمل⁵' },
            { id: 'dhuhr', time: 'صلاة الظهر', type: 'prayer', start: dhuhrCurr, end: addMins(dhuhrCurr, 30), getTask: () => 'ترديد + حزب + أذكار' },
            { id: 'noon', time: 'الظهر - العصر', type: 'normal', start: addMins(dhuhrCurr, 30), end: asrCurr, getTask: () => 'عمل' },
            { id: 'asr', time: 'صلاة العصر', type: 'prayer', start: asrCurr, end: addMins(asrCurr, 30), getTask: () => 'ترديد + ½حزب + أذكار' },
            { id: 'afternoon', time: 'العصر - المغرب', type: 'normal', start: addMins(asrCurr, 30), end: maghribCurr, getTask: (d) => [5,6].includes(d) ? 'عائلة²' : 'أسرة⁵' },
            { id: 'maghrib', time: 'صلاة المغرب', type: 'prayer', start: maghribCurr, end: addMins(maghribCurr, 20), getTask: () => 'ترديد + ½حزب + أذكار³' },
            { id: 'evening', time: 'المغرب - العشاء', type: 'normal', start: addMins(maghribCurr, 20), end: ishaCurr, getTask: (d) => [5,6].includes(d) ? 'لعب²' : 'إفطار⁵ + عربي⁵' },
            { id: 'isha', time: 'صلاة العشاء', type: 'prayer', start: ishaCurr, end: addMins(ishaCurr, 30), getTask: () => 'ترديد + حزب + أذكار' },
            { id: 'night', time: 'العشاء - القيام', type: 'normal', start: addMins(ishaCurr, 30), end: nextQiyamStart, getTask: (d) => [5,6].includes(d) ? 'وجبة مع الأسرة² + أصدقاء/أسرة' : 'نوم⁵' }
        ];

        // لا يوجد دالة Sort هنا، الجدول سيبقى بنفس الترتيب الذي كُتب فيه.

        loadTasks();
        renderTasks();
        document.getElementById('loader').style.display = 'none';
        updateClock();
    }

    function loadTasks() {
        if (localStorage.getItem('schedule_date_v3') !== logicalDateStr) {
            localStorage.setItem('schedule_date_v3', logicalDateStr);
            localStorage.setItem('schedule_data_v3', JSON.stringify({}));
            savedTasks = {};
        } else {
            savedTasks = JSON.parse(localStorage.getItem('schedule_data_v3') || '{}');
        }
    }

    function renderTasks() {
        const list = document.getElementById('todoList');
        list.innerHTML = '';
        let doneCount = 0;

        schedulePeriods.forEach((p) => {
            const isDone = savedTasks[p.id];
            if (isDone) doneCount++;
            
            const li = document.createElement('li');
            li.className = `todo-item ${p.type === 'prayer' ? 'prayer-row' : ''} ${isDone ? 'completed' : ''}`;
            li.dataset.start = p.start.getTime();
            li.dataset.end = p.end.getTime();

            const formatTime = (d) => d.toLocaleTimeString('ar-SA', { hour: '2-digit', minute: '2-digit', hour12: true });

            li.innerHTML = `
                <div class="time-block">
                    <span class="time-start">${formatTime(p.start)}</span>
                    <span class="time-end">إلى ${formatTime(p.end)}</span>
                </div>
                <div class="checkbox-container">
                    <input type="checkbox" class="custom-checkbox" id="chk-${p.id}" ${isDone ? 'checked' : ''}>
                </div>
                <div class="task-details" onclick="document.getElementById('chk-${p.id}').click()">
                    <div class="task-period">${p.time}</div>
                    <div class="task-name">${p.getTask(currentDayIndex)}</div>
                </div>
            `;
            list.appendChild(li);

            li.querySelector(`#chk-${p.id}`).addEventListener('change', (e) => {
                savedTasks[p.id] = e.target.checked;
                localStorage.setItem('schedule_data_v3', JSON.stringify(savedTasks));
                e.target.checked ? li.classList.add('completed') : li.classList.remove('completed');
                doneCount += e.target.checked ? 1 : -1;
                updateProgress(doneCount, schedulePeriods.length);
            });
        });
        updateProgress(doneCount, schedulePeriods.length);
    }

    function updateActiveTask() {
        if (!schedulePeriods.length) return;
        const now = new Date().getTime();
        document.querySelectorAll('.todo-item').forEach(item => {
            const s = parseInt(item.dataset.start);
            const e = parseInt(item.dataset.end);
            item.classList.toggle('active-task', now >= s && now < e);
        });
    }

    function updateProgress(done, total) {
        document.getElementById('progressBar').style.width = `${(done / total) * 100}%`;
    }

    initApp();
</script>
</body>
</html>
